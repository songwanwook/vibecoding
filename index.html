<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode">
            <span class="icon">🌓</span>
        </button>
        <h1>Lotto Number Generator</h1>
        <div class="lotto-machine">
            <div id="number-display" class="number-display"></div>
            <button id="generate-btn" class="generate-btn">Generate Numbers</button>
        </div>

        <div class="partnership-section">
            <hr>
            <h3>Partnership Inquiry</h3>
            <form action="https://formspree.io/f/mpqyvorr" method="POST" class="contact-form">
                <div class="form-group">
                    <input type="email" name="email" placeholder="Your Email" required>
                </div>
                <div class="form-group">
                    <textarea name="message" placeholder="Your Message" required></textarea>
                </div>
                <button type="submit" class="submit-btn">Send Inquiry</button>
            </form>
        </div>

        <div id="disqus_thread_container">
            <hr>
            <h3>Comments</h3>
            <div id="disqus_thread"></div>
        </div>
    </div>
    <script>
        /**

        this.page.identifier = PAGE_IDENTIFIER; // Replace PAGE_IDENTIFIER with your page's unique identifier variable
        };
        */

        var d = document, s = d.createElement('script');
        s.src = 'https://vibecoding-2.disqus.com/embed.js';
        s.setAttribute('data-timestamp', +new Date());
        (d.head || d.body).appendChild(s);
        })();
    </script>
    <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
    <script src="main.js"></script>
</body>
</html>
