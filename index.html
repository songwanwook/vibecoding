<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode">
            <span class="icon">🌓</span>
        </button>
        <h1>Animal Face Test</h1>
        <p class="subtitle">Are you more like a Dog or a Cat?</p>
        
        <div class="test-container">
            <div id="upload-area" class="upload-area">
                <input type="file" id="image-upload" accept="image/*" hidden>
                <div class="upload-content">
                    <span class="upload-icon">📸</span>
                    <p>Click or drag your photo here</p>
                </div>
            </div>
            
            <div id="preview-container" class="preview-container" style="display: none;">
                <img id="image-preview" src="" alt="Your face">
                <div id="loading-spinner" class="spinner" style="display: none;"></div>
            </div>

            <div id="result-container" class="result-container" style="display: none;">
                <h2 id="result-title">Analyzing...</h2>
                <div id="label-container" class="label-container"></div>
                <button id="retry-btn" class="retry-btn">Try Again</button>
            </div>
        </div>

        <div class="partnership-section">
            <hr>
            <h3>Partnership Inquiry</h3>
            <form action="https://formspree.io/f/mpqyvorr" method="POST" class="contact-form">
                <div class="form-group">
                    <input type="email" name="email" placeholder="Your Email" required>
                </div>
                <div class="form-group">
                    <textarea name="message" placeholder="Your Message" required></textarea>
                </div>
                <button type="submit" class="submit-btn">Send Inquiry</button>
            </form>
        </div>

        <div id="disqus_thread_container">
            <hr>
            <h3>Comments</h3>
            <div id="disqus_thread"></div>
        </div>
    </div>
    <script>
        /**
        *  RECOMMENDED CONFIGURATION VARIABLES: EDIT AND UNCOMMENT THE SECTION BELOW TO INSERT DYNAMIC VALUES FROM YOUR PLATFORM OR CMS.
        *  LEARN WHY DEFINING THESE VARIABLES IS IMPORTANT: https://disqus.com/admin/universalcode/#configuration-variables    */

        var disqus_config = function () {
        this.page.url = PAGE_URL;  // Replace PAGE_URL with your page's canonical URL variable
        this.page.identifier = PAGE_IDENTIFIER; // Replace PAGE_IDENTIFIER with your page's unique identifier variable
        };
        */
        (function() { // DON'T EDIT BELOW THIS LINE
        var d = document, s = d.createElement('script');
        s.src = 'https://vibecoding-2.disqus.com/embed.js';
        s.setAttribute('data-timestamp', +new Date());
        (d.head || d.body).appendChild(s);
        })();
    </script>
    <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
